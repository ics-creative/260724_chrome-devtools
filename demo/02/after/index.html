<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>デモ フロントエンド ミートアップ | デモ2 修正後</title>
    <link rel="stylesheet" href="../../base.css" />
    <link rel="stylesheet" href="./style.css" />
    <script src="./main.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <header class="event-header">
        <p class="eyebrow">Frontend Event 2026</p>
        <h1 class="event-title">デモ フロントエンド ミートアップ</h1>
        <p class="event-lead">設計、パフォーマンス、AIとの協働。現場で役立つ知見を共有する1日限りのミートアップです。</p>
        <ul class="event-meta">
          <li>2026年9月18日（金）</li>
          <li>13:00–18:30</li>
          <li>東京・渋谷ストリームホール</li>
        </ul>
      </header>

      <section class="registration" id="registration" aria-labelledby="registration-heading">
        <h2 class="section-heading" id="registration-heading">参加申し込み</h2>
        <p class="section-lead">必要事項を入力してお申し込みください。</p>
        <form id="registration-form" novalidate>
          <div class="form-grid">
            <div class="field">
              <label for="name">名前<span class="required">必須</span></label>
              <input id="name" name="name" type="text" autocomplete="name" aria-describedby="name-error" required />
              <p class="field-error" id="name-error" aria-live="polite"></p>
            </div>
            <div class="field">
              <label for="email">メールアドレス<span class="required">必須</span></label>
              <input id="email" name="email" type="email" autocomplete="email" aria-describedby="email-error" required />
              <p class="field-error" id="email-error" aria-live="polite"></p>
            </div>
            <div class="submit-area">
              <button class="button" type="submit">申し込む</button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <div class="toast" id="success-toast" role="status" aria-live="polite" aria-atomic="true" hidden>
      申し込みが完了しました。
    </div>
  </body>
</html>
