<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chrome DevTools for agents 記事用デモ</title>
    <link rel="stylesheet" href="./demo/base.css" />
    <style>
      .demo-index {
        width: 100%;
        max-width: 960px;
        padding: 72px 20px 88px;
      }

      .demo-index__header {
        margin-bottom: 44px;
      }

      .demo-index__title {
        margin-bottom: 16px;
        font-size: 3rem;
        line-height: 1.1;
        letter-spacing: -2px;
      }

      .demo-index__lead {
        max-width: 680px;
        color: var(--color-text-muted);
        font-size: 1rem;
      }

      .demo-list {
        display: grid;
        gap: 20px;
        list-style: none;
      }

      .demo-item {
        display: grid;
        grid-template-columns: 72px 1fr auto;
        gap: 24px;
        align-items: center;
        padding: 28px;
        border: 1px solid var(--color-border);
        border-radius: var(--radius-card);
        background: var(--color-surface);
        box-shadow: var(--shadow-card);

        .demo-item__number {
          color: var(--color-primary);
          font-weight: bold;
          font-size: 2rem;
          letter-spacing: -1px;
        }

        h2 {
          margin-bottom: 6px;
          font-size: 1.5rem;
        }

        p {
          color: var(--color-text-muted);
        }

        .demo-item__links {
          display: flex;
          gap: 10px;
        }
      }

      .demo-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border: 2px solid transparent;
        border-radius: var(--radius-control);
        background: var(--color-primary);
        color: #ffffff;
        font-weight: bold;
        text-decoration: none;
        transition: background-color 200ms, color 200ms;

        &:hover {
          border-color: var(--color-primary);
          background: var(--color-surface);
          color: var(--color-primary);
        }
      }

      @media (width <= 768px) {
        .demo-index {
          padding: 48px 16px 64px;
        }

        .demo-index__title {
          font-size: 2.5rem;
        }

        .demo-item {
          grid-template-columns: 1fr;
          gap: 12px;
          padding: 24px;
        }

        .demo-item__number + div {
          margin-bottom: 8px;
        }

        .demo-link {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="demo-index">
      <header class="demo-index__header">
        <p class="eyebrow">Article demos</p>
        <h1 class="demo-index__title">Chrome DevTools for agents 記事用デモ</h1>
        <p class="demo-index__lead">各デモの修正前と修正後を、ブラウザで直接比較できます。</p>
      </header>

      <ol class="demo-list">
        <li class="demo-item">
          <span class="demo-item__number">01</span>
          <div>
            <h2>PC向けカードレイアウト</h2>
            <p>カードの余白、高さ、ボタン位置を整えます。</p>
          </div>
          <div class="demo-item__links">
            <a class="demo-link" href="./demo/01/before/index.html">修正前</a>
            <a class="demo-link" href="./demo/01/after/index.html">修正後</a>
          </div>
        </li>
        <li class="demo-item">
          <span class="demo-item__number">02</span>
          <div>
            <h2>フォームの実装</h2>
            <p>入力チェックと申し込み完了表示を実装します。</p>
          </div>
          <div class="demo-item__links">
            <a class="demo-link" href="./demo/02/before/index.html">修正前</a>
            <a class="demo-link" href="./demo/02/after/index.html">修正後</a>
          </div>
        </li>
      </ol>
    </main>
  </body>
</html>
